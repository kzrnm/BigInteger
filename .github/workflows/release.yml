name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip
  WORKFLOW_BUILD_SLN: BigInteger.slnx
  PACK_CSPROJ: BigInteger/BigInteger.csproj

permissions:
  contents: write

jobs:
  get-version:
    uses: kzrnm/dotnet-actions/.github/workflows/get-version.yml@v2
    with:
      project-path: BigInteger/BigInteger.csproj

  verify:
    needs: get-version
    uses: ./.github/workflows/reusable_verify.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  build:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x
      - uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Install SourceExpander.Console
        run: dotnet tool install --global SourceExpander.Console
      - name: Build
        run: dotnet build ${{ env.WORKFLOW_BUILD_SLN }} -c Release
      - name: Test
        run: dotnet test --solution ${{ env.WORKFLOW_BUILD_SLN }} --no-build --report-github -c Release
      - name: Pack
        run: dotnet pack ${{ env.PACK_CSPROJ }} --no-build -c Release -o bin/Packages/Release
      - uses: actions/upload-artifact@v7
        with:
          name: dist-Release
          path: bin/Packages/Release
          retention-days: 1

  publish:
    needs: [get-version, verify, build]
    if: ${{ needs.get-version.outputs.is-new == 'true' }}
    uses: kzrnm/dotnet-actions/.github/workflows/publish.yml@v2
    with:
      artifact-name: dist
      version: ${{ needs.get-version.outputs.version }}
      is-prerelease: ${{ fromJson(needs.get-version.outputs.is-prerelease) }}
    secrets:
      NUGET_KEY: ${{ secrets.NUGET_KEY }}
